<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Amazon…</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 3rem;
      background: #f7f7f7;
      color: #333;
    }
    a, button {
      color: #0073bb;
      text-decoration: none;
      font-weight: bold;
      margin-top: 1rem;
    }
    button {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      cursor: pointer;
      background: #fff;
      border: 2px solid #0073bb;
      border-radius: 6px;
    }
    #browser-warning {
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid #ff9900;
      background: #fff7e6;
      display: none;
    }
  </style>
</head>

<body>
  <h2>Opening Amazon…</h2>

  <div id="browser-warning">
    <p>It looks like you're using an in-app browser (Facebook, Instagram, etc.).</p>
    <p>To open Amazon properly, tap below:</p>
    <button id="fallback-link">Open in Amazon App</button>
  </div>

  <p>If you want to continue shopping in this browser, <a id="open-in-browser" href="#">click here</a>.</p>

  <script>
    // ---------- GET URL PARAM ----------
    const params = new URLSearchParams(window.location.search);
    const encodedUrl = params.get("url");

    if (!encodedUrl) {
      document.body.innerHTML = "<p>Error: Missing destination URL.</p>";
      throw new Error("Missing URL");
    }

    const webLink = decodeURIComponent(encodedUrl);

    // ---------- TRY TO EXTRACT ASIN FOR APP ----------
    let appLink = null;
    const asinMatch = webLink.match(/\/dp\/([A-Z0-9]{10})/);

    if (asinMatch) {
      const asin = asinMatch[1];
      appLink = `amazon://dp/${asin}`;
    }

    const fallbackLink = document.getElementById("fallback-link");
    const openButton = document.getElementById("open-in-browser");

    // ---------- USER CLICK FLAG ----------
    let userClicked = false;

    // ---------- BUTTON BEHAVIOR ----------
    fallbackLink.addEventListener("click", (e) => {
      e.preventDefault();
      userClicked = true;
      window.location.href = webLink; // stay in browser
    });

    openButton.onclick = (e) => {
      e.preventDefault();
      userClicked = true;

      if (appLink) {
        const start = Date.now();
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = appLink;
        document.body.appendChild(iframe);

        setTimeout(() => {
          const elapsed = Date.now() - start;
          if (elapsed < 1200) window.location.href = webLink;
          document.body.removeChild(iframe);
        }, 1000);
      } else {
        window.location.href = webLink;
      }
    };

    // ---------- DETECT ENVIRONMENT ----------
    const ua = navigator.userAgent || "";
    const inAppBrowser = /(FBAN|FBAV|Instagram|Line|Twitter|Snapchat)/i.test(ua);
    const isMobile = /iPhone|iPad|iPod|Android/i.test(ua);

    // ---------- SHOW WARNING IF IN-APP ----------
    if (inAppBrowser) {
      document.getElementById("browser-warning").style.display = "block";
    }

    // ---------- AUTO REDIRECT ----------
    if (!inAppBrowser && isMobile && appLink) {
      setTimeout(() => {
        if (!userClicked) {
          const start = Date.now();
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = appLink;
          document.body.appendChild(iframe);

          setTimeout(() => {
            const elapsed = Date.now() - start;
            if (elapsed < 1200) window.location.href = webLink;
            document.body.removeChild(iframe);
          }, 1000);
        }
      }, 500);
    } else if (!inAppBrowser) {
      // Desktop or normal browser → go straight to Amazon
      window.location.href = webLink;
    }
  </script>
</body>
</html>
